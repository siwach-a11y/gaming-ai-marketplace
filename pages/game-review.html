  <script type="application/ld+json">
  {
    "@context": "https://schema.org",

<body data-root="../" data-year="2026" data-agent-id="game-review">
  <div class="bg-stage" aria-hidden="true">
    <div class="bg-grid"></div>
    <div class="bg-orb one"></div>
    <div class="bg-orb two"></div>
    <div class="bg-orb three"></div>
  </div>

  <main class="mx-auto max-w-5xl px-4 sm:px-6 lg:px-8 py-12 sm:py-16">
    <section id="agent-hero" class="reveal"></section>

    <section class="reveal mt-16">

      <ul id="agent-capabilities" class="mt-6 grid sm:grid-cols-2 gap-x-8 gap-y-3"></ul>
    </section>

    <section class="reveal mt-16">
      <h2 class="section-title text-2xl sm:text-3xl">Features</h2>
      <div id="agent-features" class="mt-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
    </section>

    <section class="reveal mt-16">
      <h2 class="section-title text-2xl sm:text-3xl">Sample prompts</h2>
      <p class="text-[var(--text-muted)] mt-1">Tap a prompt to preview how the agent responds.</p>
      <div id="agent-prompts" class="mt-6 grid sm:grid-cols-2 gap-3"></div>
    </section>

    <section class="reveal mt-16">
      <h2 class="section-title text-2xl sm:text-3xl">Example outputs</h2>
      <div id="agent-examples" class="mt-6 grid sm:grid-cols-2 gap-5"></div>
    </section>

    <section class="reveal mt-16">
      <h2 class="section-title text-2xl sm:text-3xl">Suggested use cases</h2>
      <div id="agent-usecases" class="mt-6 grid sm:grid-cols-3 gap-5"></div>
    </section>

    <section class="reveal mt-16">
      <h2 class="section-title text-2xl sm:text-3xl">FAQ</h2>
      <div id="agent-faq" class="mt-4 glass rounded-2xl px-5 sm:px-6"></div>
    </section>

    <section class="reveal mt-16">
      <h2 class="section-title text-2xl sm:text-3xl">Related agents</h2>
      <div id="agent-related" class="mt-6 grid sm:grid-cols-3 gap-4"></div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../data/agents.js"></script>
  <script src="../components/cards.js"></script>
  <script src="../components/navbar.js"></script>
  <script src="../components/footer.js"></script>
  <script src="../assets/js/ai-client.js"></script>
  <script src="../assets/js/agent-detail.js"></script>

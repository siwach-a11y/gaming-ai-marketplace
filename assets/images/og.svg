<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Gaming AI Marketplace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0d18"/>
      <stop offset="1" stop-color="#06070d"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="10%" r="60%">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="95%" cy="20%" r="55%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#67e8f9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <g transform="translate(90,250)">
    <rect x="0" y="-66" width="92" height="92" rx="22" fill="#7c5cff" fill-opacity="0.18" stroke="#7c5cff" stroke-opacity="0.5" stroke-width="2"/>
    <text x="46" y="0" font-family="Inter, sans-serif" font-size="52" text-anchor="middle" fill="#a78bfa">🎮</text>
  </g>
  <text x="90" y="360" font-family="Inter, system-ui, sans-serif" font-size="76" font-weight="800" fill="#ffffff">Gaming <tspan fill="url(#txt)">AI</tspan> Marketplace</text>
  <text x="92" y="420" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="500" fill="#9aa0b4">Discover specialized AI agents built for gamers.</text>
  <g font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#c4b5fd">
    <rect x="90" y="470" width="200" height="48" rx="24" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="190" y="500" text-anchor="middle">8 agents · live</text>
  </g>
</svg>
